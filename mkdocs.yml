site_name: Cardiac Digital Twin
site_description: GitHub Copilot + Simulink Agentic Toolkit — a model-based AI engineering demo
site_author: samueltauil
site_url: https://samueltauil.github.io/cardiac-digital-twin/
repo_url: https://github.com/samueltauil/cardiac-digital-twin
repo_name: samueltauil/cardiac-digital-twin
edit_uri: edit/main/docs/

# Emit page.html instead of page/index.html so links work whether the site is
# served over HTTP (mkdocs serve, GitHub Pages) or browsed via file:// directly.
use_directory_urls: false

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/samueltauil/cardiac-digital-twin
  generator: false

copyright: >
  Built with GitHub Copilot + Simulink Agentic Toolkit.
  MIT-licensed demo materials.

nav:
  - Home: index.md
  - The Copilot Workflow: copilot-workflow.md
  - Model Architecture: architecture.md
  - Physiology & Math: physiology.md
  - Validation: validation.md
  - Requirements: requirements.md
  - Real-Time Dashboard: dashboard.md
  - Reference: reference.md
